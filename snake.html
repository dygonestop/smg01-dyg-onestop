<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>🐍 Snake Game Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body {
        margin: 0;
        background: radial-gradient(circle at top, #0f5132, #000);
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .game-box {
        width: 360px;
        background: #111;
        border-radius: 16px;
        box-shadow: 0 0 40px #00ff99;
        padding: 15px;
    }

    h1 {
        text-align: center;
        margin: 5px 0 10px;
        color: #00ff99;
    }

    canvas {
        background: #000;
        border-radius: 10px;
        display: block;
        margin: auto;
        border: 2px solid #00ff99;
    }

    .info {
        display: flex;
        justify-content: space-between;
        margin: 8px 0;
        font-size: 14px;
    }

    select, button {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: none;
        margin-top: 8px;
        font-size: 14px;
    }

    select { background: #222; color: #00ff99; }
    button {
        background: linear-gradient(135deg, #00ff99, #00ccff);
        font-weight: bold;
        cursor: pointer;
    }

    button:hover { opacity: 0.85; }

    .leaderboard {
        margin-top: 10px;
        background: #000;
        padding: 8px;
        border-radius: 8px;
        font-size: 13px;
    }

    .leaderboard h3 {
        text-align: center;
        margin: 5px 0;
        color: #00ff99;
    }

    .leaderboard ol {
        padding-left: 20px;
        margin: 0;
    }

    .small {
        text-align: center;
        font-size: 11px;
        opacity: 0.7;
        margin-top: 6px;
    }
</style>
</head>

<body>
<div class="game-box">
    <h1>🐍 SNAKE PRO</h1>

    <div class="info">
        <div>Score: <span id="score">0</span></div>
        <div>Level: <span id="level">1</span></div>
    </div>

    <canvas id="game" width="320" height="320"></canvas>

    <select id="difficulty">
        <option value="easy">Easy 🟢</option>
        <option value="normal" selected>Normal 🔵</option>
        <option value="hard">Hard 🔴</option>
        <option value="extreme">Extreme ☠️</option>
    </select>

    <button onclick="startGame()">▶ MULAI GAME</button>

    <div class="leaderboard">
        <h3>🏆 TOP 10</h3>
        <ol id="rank"></ol>
        <button onclick="resetRank()">Reset Rank</button>
    </div>

    <div class="small">Kontrol: ⬅ ⬆ ➡ ⬇</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 16;
let snake, food, dx, dy, score, level, speed, loop;
let gameRunning = false;

const speedMap = {
    easy: 140,
    normal: 110,
    hard: 80,
    extreme: 55
};

function startGame() {
    clearInterval(loop);
    const diff = document.getElementById("difficulty").value;

    snake = [{x: 160, y: 160}];
    dx = grid;
    dy = 0;
    score = 0;
    level = 1;
    speed = speedMap[diff];
    gameRunning = true;

    spawnFood();
    updateUI();

    loop = setInterval(gameLoop, speed);
}

function spawnFood() {
    food = {
        x: Math.floor(Math.random() * 20) * grid,
        y: Math.floor(Math.random() * 20) * grid
    };
}

function gameLoop() {
    if (!gameRunning) return;

    const head = { x: snake[0].x + dx, y: snake[0].y + dy };

    // collision wall
    if (head.x < 0 || head.y < 0 || head.x >= canvas.width || head.y >= canvas.height ||
        snake.some(s => s.x === head.x && s.y === head.y)) {
        gameOver();
        return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
        score += 10;
        if (score % 50 === 0) {
            level++;
            speed = Math.max(30, speed - 8);
            clearInterval(loop);
            loop = setInterval(gameLoop, speed);
        }
        spawnFood();
    } else {
        snake.pop();
    }

    draw();
    updateUI();
}

function draw() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // food
    ctx.fillStyle = "#ff3333";
    ctx.fillRect(food.x, food.y, grid, grid);

    // snake
    snake.forEach((s, i) => {
        ctx.fillStyle = i === 0 ? "#00ff99" : "#009966";
        ctx.fillRect(s.x, s.y, grid - 1, grid - 1);
    });
}

function updateUI() {
    document.getElementById("score").textContent = score;
    document.getElementById("level").textContent = level;
}

function gameOver() {
    gameRunning = false;
    clearInterval(loop);
    saveRank(score);
    alert("💀 GAME OVER\nScore: " + score);
    loadRank();
}

document.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft" && dx === 0) { dx = -grid; dy = 0; }
    if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -grid; }
    if (e.key === "ArrowRight" && dx === 0) { dx = grid; dy = 0; }
    if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = grid; }
});

/* ===== LEADERBOARD ===== */
function saveRank(score) {
    let ranks = JSON.parse(localStorage.getItem("snakeRank")) || [];
    ranks.push(score);
    ranks.sort((a,b) => b - a);
    ranks = ranks.slice(0,10);
    localStorage.setItem("snakeRank", JSON.stringify(ranks));
}

function loadRank() {
    const ranks = JSON.parse(localStorage.getItem("snakeRank")) || [];
    const ol = document.getElementById("rank");
    ol.innerHTML = "";
    ranks.forEach((s,i) => {
        const li = document.createElement("li");
        li.textContent = `#${i+1} - ${s}`;
        ol.appendChild(li);
    });
}

function resetRank() {
    if (confirm("Reset TOP 10?")) {
        localStorage.removeItem("snakeRank");
        loadRank();
    }
}

loadRank();
</script>
</body>
</html>
