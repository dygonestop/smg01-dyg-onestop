<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUDO PRO ULTIMATE - dyg++</title>
    <style>
        :root {
            --red: #e74c3c; --blue: #3498db; --green: #2ecc71; --yellow: #f1c40f;
            --dark: #2c3e50; --white: #ecf0f1;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: #1a1a1a; color: white; font-family: 'Arial', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* CONTAINER UTAMA */
        .ludo-container {
            margin-top: 20px; position: relative; width: 360px; height: 360px;
            background: #fff; border: 6px solid #333; box-shadow: 0 0 40px rgba(0,0,0,0.5);
            display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr);
        }

        /* GRID STYLING */
        .cell { border: 0.2px solid #ddd; position: relative; }
        .home { grid-column: span 6; grid-row: span 6; position: relative; border: 2px solid #333; }
        .inner-home {
            width: 70%; height: 70%; background: white; border-radius: 15%;
            position: absolute; top: 15%; left: 15%; display: grid;
            grid-template-columns: 1fr 1fr; padding: 5px; gap: 10px;
        }
        .token-spot { border-radius: 50%; border: 2px dashed #ccc; }

        /* WARNA TIAP AREA */
        .red { background: var(--red); } .blue { background: var(--blue); }
        .green { background: var(--green); } .yellow { background: var(--yellow); }
        
        /* JALUR FINISH */
        .finish-center { grid-column: 7/10; grid-row: 7/10; background: #333; position: relative; }
        .finish-center svg { width: 100%; height: 100%; }

        /* BIDAK (PAWN) */
        .pawn {
            width: 20px; height: 20px; border-radius: 50%;
            position: absolute; z-index: 100; border: 2px solid #fff;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .pawn.active { animation: bounce 0.6s infinite alternate; box-shadow: 0 0 15px white; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.3); } }

        /* PANEL KONTROL */
        .ui-panel {
            width: 360px; margin-top: 20px; background: #333;
            padding: 15px; border-radius: 15px; display: flex; align-items: center; justify-content: space-between;
        }
        #dice-box {
            width: 65px; height: 65px; background: white; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; color: #333; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 0 #999;
        }
        #dice-box:active { transform: translateY(3px); box-shadow: 0 2px 0 #999; }
        
        .status-box { text-align: right; }
        .badge { padding: 5px 12px; border-radius: 20px; font-weight: 900; font-size: 12px; }

        /* OVERLAY AWAL */
        #start-menu {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-start {
            background: var(--yellow); border: none; padding: 15px 40px;
            border-radius: 30px; font-weight: 900; font-size: 18px; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="start-menu">
    <h1 style="color:var(--yellow); font-size: 32px; margin: 0;">LUDO PRO</h1>
    <p style="opacity: 0.6;">Dyg++ Gaming Arena</p>
    <button class="btn-start" onclick="startGame()">▶ MULAI PERMAINAN</button>
</div>

<div class="ludo-container" id="board">
    <div class="home red" style="grid-column: 1/7; grid-row: 1/7;"><div class="inner-home"><div class="token-spot"></div><div class="token-spot"></div><div class="token-spot"></div><div class="token-spot"></div></div></div>
    <div class="home green" style="grid-column: 10/16; grid-row: 1/7;"><div class="inner-home"><div class="token-spot"></div><div class="token-spot"></div><div class="token-spot"></div><div class="token-spot"></div></div></div>
    <div class="home yellow" style="grid-column: 1/7; grid-row: 10/16;"><div class="inner-home"><div class="token-spot"></div><div class="token-spot"></div><div class="token-spot"></div><div class="token-spot"></div></div></div>
    <div class="home blue" style="grid-column: 10/16; grid-row: 10/16;"><div class="inner-home"><div class="token-spot"></div><div class="token-spot"></div><div class="token-spot"></div><div class="token-spot"></div></div></div>
    
    <div class="finish-center">
        <svg viewBox="0 0 100 100">
            <polygon points="0,0 50,50 100,0" fill="#f1c40f"/>
            <polygon points="100,0 50,50 100,100" fill="#3498db"/>
            <polygon points="100,100 50,50 0,100" fill="#2ecc71"/>
            <polygon points="0,100 50,50 0,0" fill="#e74c3c"/>
        </svg>
    </div>

    </div>

<div class="ui-panel">
    <div id="dice-box" onclick="rollDice()">🎲</div>
    <div class="status-box">
        <div id="turn-badge" class="badge red">GILIRAN: MERAH</div>
        <div id="info" style="font-size: 11px; margin-top: 8px; color: #aaa;">Klik dadu untuk mulai</div>
    </div>
</div>

<script>
    // DATA PATH & KOORDINAT
    const players = [
        { color: 'red', tokens: [-1, -1, -1, -1], home: [[1.5,1.5],[1.5,3.5],[3.5,1.5],[3.5,3.5]], startPath: 0 },
        { color: 'green', tokens: [-1, -1, -1, -1], home: [[10.5,1.5],[10.5,3.5],[12.5,1.5],[12.5,3.5]], startPath: 13 },
        { color: 'blue', tokens: [-1, -1, -1, -1], home: [[10.5,10.5],[10.5,12.5],[12.5,10.5],[12.5,12.5]], startPath: 39 },
        { color: 'yellow', tokens: [-1, -1, -1, -1], home: [[1.5,10.5],[1.5,12.5],[3.5,10.5],[3.5,12.5]], startPath: 26 }
    ];

    const mainPath = [
        [6,1],[6,2],[6,3],[6,4],[6,5],[5,6],[4,6],[3,6],[2,6],[1,6],[0,6],[0,7],[0,8],[1,8],[2,8],[3,8],[4,8],[5,8],[6,9],[6,10],[6,11],[6,12],[6,13],[6,14],[7,14],[8,14],[8,13],[8,12],[8,11],[8,10],[8,9],[9,8],[10,8],[11,8],[12,8],[13,8],[14,8],[14,7],[14,6],[13,6],[12,6],[11,6],[10,6],[9,6],[8,5],[8,4],[8,3],[8,2],[8,1],[8,0],[7,0],[6,0]
    ];

    let currentTurn = 0;
    let diceValue = 0;
    let canRoll = true;

    function startGame() {
        document.getElementById('start-menu').style.display = 'none';
        generateCells();
        updatePawns();
    }

    function generateCells() {
        const board = document.getElementById('board');
        // Hanya render cell jalur kosong
        mainPath.forEach((p, i) => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.style.gridColumn = p[1] + 1;
            cell.style.gridRow = p[0] + 1;
            // Warna jalur start
            if(i === 0) cell.style.background = 'var(--red)';
            if(i === 13) cell.style.background = 'var(--green)';
            if(i === 26) cell.style.background = 'var(--yellow)';
            if(i === 39) cell.style.background = 'var(--blue)';
            board.appendChild(cell);
        });
    }

    function rollDice() {
        if(!canRoll) return;
        canRoll = false;
        const box = document.getElementById('dice-box');
        
        let count = 0;
        let rollAnim = setInterval(() => {
            diceValue = Math.floor(Math.random() * 6) + 1;
            box.innerText = diceValue;
            count++;
            if(count > 10) {
                clearInterval(rollAnim);
                checkMovableTokens();
            }
        }, 50);
    }

    function checkMovableTokens() {
        const p = players[currentTurn];
        let hasMove = false;

        p.tokens.forEach((pos, i) => {
            if(pos === -1 && diceValue === 6) hasMove = true;
            if(pos >= 0) hasMove = true;
        });

        if(!hasMove) {
            document.getElementById('info').innerText = "Tidak ada langkah!";
            setTimeout(nextTurn, 1000);
        } else {
            document.getElementById('info').innerText = "Pilih bidak untuk jalan";
            highlightTokens();
        }
    }

    function highlightTokens() {
        const p = players[currentTurn];
        p.tokens.forEach((pos, i) => {
            if(pos >= 0 || (pos === -1 && diceValue === 6)) {
                const pawn = document.getElementById(`pawn-${currentTurn}-${i}`);
                pawn.classList.add('active');
                pawn.onclick = () => moveToken(i);
            }
        });
    }

    function moveToken(idx) {
        const p = players[currentTurn];
        
        // Hapus status aktif
        document.querySelectorAll('.pawn').forEach(el => { el.classList.remove('active'); el.onclick = null; });

        if(p.tokens[idx] === -1) {
            p.tokens[idx] = 0; // Keluar dari rumah
        } else {
            p.tokens[idx] += diceValue;
        }

        // Cek Makan (Kick)
        checkCapture(idx);
        
        updatePawns();
        
        if(diceValue === 6) {
            canRoll = true;
            document.getElementById('info').innerText = "Dapat 6! Kocok lagi.";
        } else {
            nextTurn();
        }
    }

    function checkCapture(movedIdx) {
        const p = players[currentTurn];
        const movedPos = (p.startPath + p.tokens[movedIdx]) % 52;

        players.forEach((other, pIdx) => {
            if(pIdx !== currentTurn) {
                other.tokens.forEach((oPos, oIdx) => {
                    if(oPos >= 0) {
                        const otherActualPos = (other.startPath + oPos) % 52;
                        if(movedPos === otherActualPos) {
                            other.tokens[oIdx] = -1; // Makan!
                            document.getElementById('info').innerText = "KICK! Bidak lawan dimakan!";
                        }
                    }
                });
            }
        });
    }

    function updatePawns() {
        document.querySelectorAll('.pawn').forEach(el => el.remove());
        players.forEach((p, pIdx) => {
            p.tokens.forEach((pos, tIdx) => {
                const pawn = document.createElement('div');
                pawn.className = `pawn ${p.color}`;
                pawn.id = `pawn-${pIdx}-${tIdx}`;
                
                let r, c;
                if(pos === -1) {
                    r = p.home[tIdx][0]; c = p.home[tIdx][1];
                } else {
                    const actualIdx = (p.startPath + pos) % 52;
                    r = mainPath[actualIdx][0]; c = mainPath[actualIdx][1];
                }

                pawn.style.top = (r * 24 + 2) + 'px';
                pawn.style.left = (c * 24 + 2) + 'px';
                document.getElementById('board').appendChild(pawn);
            });
        });
    }

    function nextTurn() {
        currentTurn = (currentTurn + 1) % 4;
        canRoll = true;
        const badge = document.getElementById('turn-badge');
        const p = players[currentTurn];
        badge.innerText = `GILIRAN: ${p.color.toUpperCase()}`;
        badge.className = `badge ${p.color}`;
        document.getElementById('info').innerText = "Kocok dadu!";
    }
</script>

</body>
</html>
