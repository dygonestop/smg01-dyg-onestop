<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAPUR PRO | dyg++</title>
    <style>
        :root{ --main:#1B4332; --danger:#c0392b; --bg:#f2f4f7; --new:#e74c3c; }
        body{ margin:0; background:var(--bg); font-family:'Segoe UI',Arial,sans-serif; }
        .header{ margin:15px; padding:15px 20px; background:white; border-radius:14px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 4px 10px rgba(0,0,0,.05); position:sticky; top:15px; z-index:100; }
        .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:15px; padding:15px; }
        .card{ background:white; border-radius:16px; padding:18px; border-top:8px solid var(--main); animation:pop .3s ease; transition:0.4s; position:relative; }
        .card.new{ border-top-color: var(--new); box-shadow: 0 0 15px rgba(231,76,60,0.3); }
        .no{ font-size:42px; font-weight:900; color:var(--main); }
        .items{ margin:14px 0; font-family:'Courier New',monospace; font-weight:900; font-size:16px; line-height:1.4; }
        .sku{ color:var(--danger); font-weight:bold; }
        .btn{ width:100%; padding:18px; border:none; border-radius:12px; background:var(--main); color:white; font-weight:900; cursor:pointer; font-size:16px; }
        .btn:disabled{ background:#ccc; }
        @keyframes pop { from{transform:scale(0.9); opacity:0;} to{transform:scale(1); opacity:1;} }
    </style>
</head>
<body onclick="enableAudio()">

<div class="header">
    <div>
        <h2 style="margin:0">👨‍🍳 MONITOR DAPUR</h2>
        <div id="status">● Menghubungkan...</div>
    </div>
    <div id="sku-status" style="font-size:11px; color:#999">Sync SKU...</div>
</div>

<div class="grid" id="list"></div>

<script>
const CONFIG = {
    // GANTI URL INI DENGAN HASIL DEPLOY TERBARU
    API_URL: "https://script.google.com/macros/s/AKfycbybc-ZfXX_phRICW4v1BykKkd3L8CaWr4VuRPwj45GugNtBWaPPHG7FVnL9QI-3Xp8N1A/exec",
    TOKEN: "dyg-access-v2",
    REFRESH: 7000,
    SOUND: "https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"
};

let skuMap = {};
let previousIds = new Set();
let isAudioEnabled = false;
const audio = new Audio(CONFIG.SOUND);

function enableAudio() {
    isAudioEnabled = true;
    audio.play().then(() => { audio.pause(); audio.currentTime = 0; });
}

async function fetchSKU() {
    try {
        const r = await fetch(`${CONFIG.API_URL}?token=${CONFIG.TOKEN}&action=getMenu`);
        const data = await r.json();
        data.forEach(item => skuMap[item.name] = item.sku);
        document.getElementById('sku-status').innerText = "SKU Aktif ✅";
    } catch(e) { document.getElementById('sku-status').innerText = "SKU Gagal ❌"; }
}

function getSku(name) {
    let clean = name.replace(/^\d+x\s+/i, "").trim().toLowerCase();
    return skuMap[clean] || "??";
}

async function loadOrders() {
    const statusEl = document.getElementById("status");
    try {
        const res = await fetch(`${CONFIG.API_URL}?token=${CONFIG.TOKEN}&action=getAntrean`);
        const text = await res.text();
        
        let data;
        try { data = JSON.parse(text); } catch(e) { throw new Error("Format Server Salah"); }

        if (data.status === "error") throw new Error(data.message);

        statusEl.innerText = "● TERHUBUNG";
        statusEl.style.color = "green";

        // Cek Pesanan Baru untuk Bunyi
        const currentIds = new Set(data.map(o => String(o.row)));
        let hasNew = [...currentIds].some(id => !previousIds.has(id));
        
        if (hasNew && previousIds.size > 0 && isAudioEnabled) {
            audio.play().catch(e => console.log("Sound blocked"));
        }
        
        previousIds = currentIds;
        render(data);
    } catch(e) {
        statusEl.innerText = "● ERROR: " + e.message;
        statusEl.style.color = "red";
    }
}

function render(orders) {
    const box = document.getElementById("list");
    if (orders.length === 0) {
        box.innerHTML = "<div style='padding:20px'>Menunggu pesanan baru...</div>";
        return;
    }

    box.innerHTML = orders.map(o => {
        const items = o.Pesanan.split('\n').map(i => {
            if(!i.trim()) return "";
            return `<div><span class="sku">[${getSku(i)}]</span> ${i}</div>`;
        }).join("");

        return `
            <div class="card" id="row-${o.row}">
                <div class="no">#${o.Antrean}</div>
                <div style="font-weight:bold; font-size:18px">${o.Nama}</div>
                <div style="color:#666; font-size:13px">${o.Mode} ${o.Meja ? '| Meja: '+o.Meja : ''}</div>
                <div class="items">${items}</div>
                ${o.Catatan ? `<div style="background:#fff3cd; padding:8px; border-radius:5px; font-size:12px">Catatan: ${o.Catatan}</div>` : ''}
                <button class="btn" style="margin-top:15px" onclick="finish('${o.row}')">SELESAI & CETAK</button>
            </div>
        `;
    }).join("");
}

async function finish(row) {
    const btn = document.querySelector(`#row-${row} .btn`);
    btn.disabled = true;
    btn.innerText = "Mencetak...";

    try {
        const order = (await (await fetch(`${CONFIG.API_URL}?token=${CONFIG.TOKEN}&action=getAntrean`)).json()).find(o => String(o.row) === String(row));
        
        // Update di GAS
        const res = await fetch(`${CONFIG.API_URL}?token=${CONFIG.TOKEN}&action=updateStatus&row=${row}`);
        const result = await res.json();

        if (result.status === "success") {
            printOrder(order);
            document.getElementById(`row-${row}`).style.opacity = "0";
            setTimeout(loadOrders, 500);
        }
    } catch(e) {
        alert("Gagal update!");
        btn.disabled = false;
    }
}

function printOrder(o) {
    let txt = `      dyg++ KITCHEN\n================================\n`;
    txt += `Antrean : #${o.Antrean}\nNama    : ${o.Nama}\nLayanan : ${o.Mode}\n`;
    if (o.Meja) txt += `Meja    : ${o.Meja}\n`;
    txt += `--------------------------------\nPESANAN:\n`;

    const daftarMenu = o.Pesanan.split("\n").map(item => {
        if (!item.trim()) return "";
        return `[${getSku(item)}] -- ${item}\n  - - - - - - - - - - - - - - -`; 
    }).filter(line => line !== "").join("\n");

    txt += `${daftarMenu}\n\n--------------------------------\n\n\n\n`;

    if (/Android/i.test(navigator.userAgent)) {
        window.location.href = "rawbt:base64," + btoa(unescape(encodeURIComponent(txt)));
    } else {
        console.log(txt);
    }
}

// START
fetchSKU().then(() => {
    loadOrders();
    setInterval(loadOrders, CONFIG.REFRESH);
});
</script>
</body>
</html>
