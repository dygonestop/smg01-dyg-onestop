<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAPUR | dyg++</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <style>
.btn-check-sound {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(59, 130, 246, 0.3);
        }
        .btn-check-sound:active { transform: scale(0.95); background: #2563eb; }
        
        /* Sembunyikan tombol cek sound jika suara sedang Mute */
        .hidden { display: none; }

.voice-control {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 10px 16px;
            border-radius: 12px;
            transition: all 0.2s ease;
            user-select: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        /* Saat Suara Mati (Default) */
        .voice-off { background: #fee2e2; color: #991b1b; border: 2px solid #ef4444; }
        /* Saat Suara Aktif */
        .voice-on { background: #dcfce7; color: #166534; border: 2px solid #22c55e; box-shadow: 0 0 10px rgba(34, 197, 94, 0.3); }
        
        .voice-icon { font-size: 20px; }
        .voice-text { font-size: 12px; font-weight: 800; text-transform: uppercase; }

        :root{ --main:#1B4332; --danger:#c0392b; --bg:#f2f4f7; }
        body{ margin:0; background:var(--bg); font-family:Segoe UI,Arial,sans-serif; }
        .header{ margin:15px; padding:15px 20px; background:white; border-radius:14px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 4px 10px rgba(0,0,0,.05); }
        #status{ font-weight:900; color:orange; }
        .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:15px; padding:15px; }
        .card{ background:white; border-radius:16px; padding:18px; border-top:8px solid var(--main); position:relative; animation:pop .3s ease; transition: all 0.5s ease; }
        @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
        .no{ font-size:38px; font-weight:900; color:var(--main); }
        .name{ font-size:20px; font-weight:900; }
        .mode{ display:inline-block; margin-top:4px; padding:4px 10px; border-radius:12px; font-size:11px; font-weight:900; background:#eee; }
        .items{ margin:14px 0; font-family:Courier New,monospace; font-weight:900; line-height:1.4; }
        .btn{ width:100%; padding:16px; border:none; border-radius:12px; background:var(--main); color:white; font-weight:900; cursor:pointer; }
        .slide-out-left { transform: translateX(-150%) rotate(-10deg); opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h2 style="margin:0">👨‍🍳 MONITOR DAPUR</h2>
        <div id="status">● Menghubungkan...</div>
    </div>

    <div style="display: flex; gap: 10px; align-items: center;">
        <button id="checkSoundBtn" class="btn-check-sound hidden" onclick="speak('Tes suara dapur, satu dua tiga')">
            🎵 CEK SOUND
        </button>

        <div id="voiceBtn" class="voice-control voice-off" onclick="toggleVoice()">
            <span id="vIcon" class="voice-icon">🔇</span>
            <span id="vText" class="voice-text">Suara: Mute</span>
        </div>
    </div>
</div>

<script>
/* ================= CONFIG ================= */
const CONFIG = {
    // URL Deployment GAS Anda
    API_URL: "https://script.google.com/macros/s/AKfycbxvPOgnZYzJNP3PvJsUP2EMruLF2GmsWQWWLgBpJbtTFC7YtCCabtCtVE2s4LPwD3AVxQ/exec",
    TOKEN: "dyg-access-v2",
    REFRESH: 8000 // Sinkronisasi setiap 8 detik
};

/* ================= STATE ================= */
let lastCount = 0;
let removedRows = []; // Menyimpan ID baris yang sudah diselesaikan agar tidak muncul lagi saat refresh
let currentOrders = [];

/* ================= STATE & VOICE LOGIC ================= */
let isVoiceEnabled = false; // Status awal suara mati

function toggleVoice() {
    isVoiceEnabled = !isVoiceEnabled;
    const btn = document.getElementById("voiceBtn");
    const icon = document.getElementById("vIcon");
    const text = document.getElementById("vText");
    const checkBtn = document.getElementById("checkSoundBtn");

    if (isVoiceEnabled) {
        // Mode SUARA AKTIF
        btn.className = "voice-control voice-on";
        icon.innerText = "🔊";
        text.innerText = "Suara: ON";
        
        if(checkBtn) checkBtn.classList.remove("hidden"); // Munculkan tombol cek sound
        
        speak("Notifikasi suara aktif");
    } else {
        // Mode MUTE
        btn.className = "voice-control voice-off";
        icon.innerText = "🔇";
        text.innerText = "Suara: Mute";
        
        if(checkBtn) checkBtn.classList.add("hidden"); // Sembunyikan tombol cek sound
        
        window.speechSynthesis.cancel(); 
    }
}

function speak(txt) {
    if ('speechSynthesis' in window) {
        // Batalkan suara sebelumnya agar tidak menumpuk (biar responsif)
        window.speechSynthesis.cancel(); 
        
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'id-ID';
        msg.rate = 1.0;
        window.speechSynthesis.speak(msg);
    }
}

/* ================= LOAD DATA (Sesuai Logika Terakhir Anda) ================= */
function loadOrders() {
    const url = `${CONFIG.API_URL}?token=${CONFIG.TOKEN}&action=getAntrean`;

    fetch(url, { cache: 'no-store' })
        .then(r => r.json())
        .then(data => {
            document.getElementById("status").innerText = "TERHUBUNG";
            document.getElementById("status").style.color = "green";
            
            const filteredData = data.filter(o => !removedRows.includes(String(o.row)));

            // NOTIFIKASI SUARA:
            // Hanya bunyi jika ada data baru, bukan saat refresh pertama (lastCount !== 0)
            // Dan hanya bunyi jika sakelar isVoiceEnabled bernilai TRUE
            if (filteredData.length > lastCount && lastCount !== 0) {
                if (isVoiceEnabled) {
                    speak("Orderan baru diterima");
                }
            }
            
            lastCount = filteredData.length;
            currentOrders = data; 
            render(filteredData);
        })
        .catch(e => {
            document.getElementById("status").innerText = "OFFLINE / ERROR";
            document.getElementById("status").style.color = "red";
            console.error("Fetch Error:", e);
        });
}

/* ================= LOAD DATA ================= */
function loadOrders() {
    const url = `${CONFIG.API_URL}?token=${CONFIG.TOKEN}&action=getAntrean`;

    fetch(url, { cache: 'no-store' })
        .then(r => r.json())
        .then(data => {
            document.getElementById("status").innerText = "TERHUBUNG";
            document.getElementById("status").style.color = "green";
            
            /* FILTER: Kita hanya menampilkan data yang ID barisnya 
               TIDAK ada di dalam daftar 'removedRows' (pesanan yang baru saja Anda klik selesai)
            */
            const filteredData = data.filter(o => !removedRows.includes(String(o.row)));

            // Notifikasi suara jika ada pesanan yang benar-benar baru masuk ke server
            if (filteredData.length > lastCount && lastCount !== 0) {
                playVoiceNotif();
            }
            
            lastCount = filteredData.length;
            currentOrders = data; 
            render(filteredData);
        })
        .catch(e => {
            document.getElementById("status").innerText = "OFFLINE / ERROR";
            document.getElementById("status").style.color = "red";
            console.error("Fetch Error:", e);
        });
}
/* ================= RENDER CARD ================= */
function render(active){
    const box = document.getElementById("list");

    if(active.length === 0){
        box.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:#999;padding:50px">Tidak ada pesanan baru</div>`;
        return;
    }

    box.innerHTML = active.map(o => {
        let daftarMenu = "";
        try {
            if (o.Pesanan && o.Pesanan.trim().startsWith('{')) {
                const jsonPesanan = JSON.parse(o.Pesanan);
                daftarMenu = Object.keys(jsonPesanan).map(menu => `• ${jsonPesanan[menu].qty}x ${menu}`).join("<br>");
            } else {
                daftarMenu = o.Pesanan.split(/,|\n/).map(i => `• ${i.trim()}`).filter(i => i !== "•").join("<br>");
            }
        } catch (e) {
            daftarMenu = `• ${o.Pesanan}`;
        }

        return `
            <div class="card" id="c-${o.row}" data-row="${o.row}">
                <div class="no">#${o.Antrean}</div>
                <div class="name">${o.Nama || 'Tanpa Nama'}</div>
                <div class="mode">${o.Mode} ${o.Meja ? `<span style="color:var(--danger)">[ MEJA ${o.Meja} ]</span>` : ''}</div>
                <div class="items">${daftarMenu}</div>
                
                ${o.Catatan ? `
                <div style="background:#FFF9C4; padding:10px; border-left:5px solid #FBC02D; margin-top:12px; border-radius:8px; font-size:13px; color:#5D4037; line-height:1.4;">
                    <strong style="display:block; margin-bottom:2px;">⚠️ CATATAN:</strong>
                    ${o.Catatan}
                </div>` : ''}

                <button class="btn" onclick="finish(${o.row})" style="margin-top:15px;">✔ SELESAI & CETAK</button>
            </div>
        `;
    }).join("");

    // Aktifkan kembali Hammer JS untuk Swipe
    document.querySelectorAll(".card").forEach(card => {
        const mc = new Hammer(card);
        mc.on("swipeleft", () => {
            const rowId = card.getAttribute("data-row");
            finish(rowId);
        });
    });
}
/* ================= ACTION ================= */
function finish(row) {
    const orderData = currentOrders.find(o => o.row == row);
    
    // 1. Animasi & Sembunyikan Instan secara Visual
    const card = document.getElementById("c-" + row);
    if (card) card.classList.add("slide-out-left");
    
    // Tambahkan ke daftar "sudah dihapus" agar tidak muncul saat auto-refresh
    if (!removedRows.includes(String(row))) {
        removedRows.push(String(row));
    }

    // 2. Eksekusi Cetak (Mempertahankan fungsi RawBT Anda)
    if (orderData) printOrder(orderData);

    // 3. Update Status ke Google Sheets (Background Sync)
    const url = `${CONFIG.API_URL}?token=${CONFIG.TOKEN}&action=updateStatus&row=${row}`;
    fetch(url)
        .then(r => r.text())
        .then(res => console.log("Sync Sheet Success:", res))
        .catch(e => console.error("Sync Failed:", e));

    // 4. Hapus elemen dari DOM setelah animasi selesai
    setTimeout(() => { 
        if (card) card.remove();
        // Jika setelah dihapus layar kosong, jalankan render ulang untuk memicu empty state
        if (document.querySelectorAll('.card').length === 0) {
            render([]);
        }
    }, 500);
}

/* ================= PRINT FUNCTION (RAWBT BASE64) ================= */
function printOrder(order) {
    // Format teks untuk printer thermal
    let txt = `      dyg++ KITCHEN\n`;
    txt += `================================\n`;
    txt += `Antrean : #${order.Antrean}\n`;
    txt += `Nama    : ${order.Nama}\n`;
    txt += `Layanan : ${order.Mode}\n`;
    if (order.Meja) txt += `Meja    : ${order.Meja}\n`;
    txt += `Waktu   : ${new Date().toLocaleTimeString()}\n`;
    txt += `--------------------------------\n`;
    txt += `PESANAN:\n${order.Pesanan}\n`;
    
    // TAMBAHKAN CATATAN DI SINI JIKA ADA (DARI KOLOM I)
    if (order.Catatan && order.Catatan.trim() !== "") {
        txt += `--------------------------------\n`;
        txt += `CATATAN:\n${order.Catatan}\n`;
    }
    
    txt += `--------------------------------\n\n\n\n`; 

    // Encode ke Base64 untuk dikirim ke aplikasi RawBT
    const base64Data = btoa(unescape(encodeURIComponent(txt)));
    window.location.href = "rawbt:base64," + base64Data;
}

/* ================= START ================= */
loadOrders();
// Interval sinkronisasi otomatis
setInterval(loadOrders, CONFIG.REFRESH);
</script>
</body>
</html>
